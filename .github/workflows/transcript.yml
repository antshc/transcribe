name: Transcribe Youtube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Youtube URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run transcript
        run: |
          docker run --rm khdevnet/ytt:latest --url "${{ github.event.inputs.url }}" --repo antshc/youtube-transcripts --token "${{ secrets.GIT_HUB_PAT }}"
